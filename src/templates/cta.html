<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Yovo — Download CTA</title>
  <style>{{STYLES}}</style>
</head>
<body class="theme-{{THEME}} cta-slide">
  <div class="canvas">
    <div class="deco deco-divider-top" aria-hidden="true"></div>
    <div class="deco deco-divider-bottom" aria-hidden="true"></div>

    <div class="header">
      <div class="slide-no">03</div>
      <div class="brand-mark">@yovo_app</div>
    </div>

    <div class="cta-body">
      <div class="cta-wordmark">Yovo<span class="dot">.</span></div>
      <div class="cta-tagline">One list a day.</div>
      <div class="cta-divider"></div>
      <div class="cta-pitch">Max 4 tasks. 24 hours each.<br>Then archive. That's it.</div>
      <div class="cta-action">
        <div class="cta-button">Download on the App Store</div>
        <div class="cta-meta">iOS · Free · No ads</div>
      </div>
    </div>

    <div class="footer cta-footer">
      <div class="wordmark">app-yovo.com</div>
      <div class="cta">Made in Boston · Swiss roots</div>
    </div>
  </div>
</body>
</html>
